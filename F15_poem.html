<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詩詞匯集 - 愚公學佛誌</title>
    <style>
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            line-height: 1.8;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f9f7f2;
        }
        .content-card {
            background-color: #fff;
            padding: 50px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid #8b4513;
        }
        h1 {
            color: #8b4513;
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 40px;
            font-size: 2em;
            letter-spacing: 4px;
        }
        /* 詩詞區塊樣式 */
        .poem-section {
            text-align: center;
            margin-bottom: 60px;
        }
        .poem-content {
            font-size: 1.4em;
            font-weight: 500;
            color: #222;
            margin-bottom: 15px;
            letter-spacing: 2px;
            line-height: 1.6;
        }
        .poem-author {
            font-size: 0.95em;
            color: #888;
            font-style: normal;
        }
        /* 分隔線 */
        .divider {
            width: 50px;
            height: 1px;
            background-color: #dcdcdc;
            margin: 0 auto 30px;
        }
        footer {
            text-align: center;
            font-size: 0.9em;
            color: #999;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        /* 返回首頁連結 */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            text-decoration: none;
            color: #8b4513;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="content-card">
    <h1>詩詞匯集</h1>

    <div class="poem-section">
        <div class="poem-content">
            不令別人煩惱，是慈悲。<br>
            不令自己煩惱，是智慧。
        </div>
        <div class="poem-author">作者: 佚名</div>
    </div>

    <div class="divider"></div>

    <div class="poem-section">
        <div class="poem-content">
            身是菩提樹，<br>
            心如明鏡台，<br>
            時時勤拂拭，<br>
            勿使惹塵埃。
        </div>
        <div class="poem-author">作者: 唐代初 神秀（約606-706）</div>
    </div>

    <div class="divider"></div>

    <div class="poem-section">
        <div class="poem-content">
            菩提本無樹，<br>
            明鏡亦非台，<br>
            本來無一物，<br>
            何處惹塵埃。
        </div>
        <div class="poem-author">作者: 唐代初 惠能（638-713）</div>
    </div>

    <footer>
        更新日期:2026年4月29日
    </footer>
</div>

<a href="index.html" class="back-link">← 返回 愚公學佛誌 首頁</a>

</body>
</html>
